name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0, no v prefix)'
        required: true
        type: string
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "Release version: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Set release version and tag
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Ensure we're on main (tag-triggered builds check out a detached HEAD).
          git checkout main

          # Update version if it differs (e.g. still has -SNAPSHOT suffix).
          CURRENT=$(grep '^version=' gradle.properties | cut -d= -f2)
          echo "Current version in gradle.properties: '$CURRENT'"
          echo "Target release version: '$VERSION'"
          
          if [ "$CURRENT" != "$VERSION" ]; then
            echo "Versions differ — updating gradle.properties"
            sed -i "s/^version=.*/version=$VERSION/" gradle.properties
          
            echo "gradle.properties version line after update: $(grep '^version=' gradle.properties)"
          
            git add gradle.properties
            git commit -m "chore: bump version to $VERSION"
            git push
          else
            echo "Version already correct — no commit needed"
          fi

          # Create or move the tag to this commit (the clean version commit).
          # Force-push in case we need to move the tag from the SNAPSHOT commit.
          git tag -f "v$VERSION"
          git push origin -f "v$VERSION"
          echo "Tagged $(git rev-parse HEAD) as v$VERSION"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 24

      - uses: gradle/actions/setup-gradle@v4

      - name: Run checks
        run: ./gradlew check
        env:
          CHROME_BIN: google-chrome-stable

      - name: Publish to Maven Central
        run: ./gradlew publishAggregationToCentralPortal
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_SIGNING_PASSWORD: ${{ secrets.GPG_SIGNING_PASSWORD }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.VERSION }}" \
            --generate-notes \
            --title "Release v${{ steps.version.outputs.VERSION }}"

      - name: Build web demo bundle
        run: ./gradlew :web:jsBrowserProductionWebpack

      - name: Deploy web demo to Hugo site
        run: |
          git clone --depth 1 https://x-access-token:${{ secrets.BREISCHL_DEV_REPO_ACCESS_TOKEN }}@github.com/breischl/breischl.github.io.git hugo-site
          cp web/build/kotlin-webpack/js/productionExecutable/web.js hugo-site/static/demos/keneth/web.js
          cd hugo-site
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/demos/keneth/web.js
          git diff --staged --quiet || \
            git commit -m "Update Keneth web demo bundle (v${{ steps.version.outputs.VERSION }})" && \
            git push

      - name: Bump to next snapshot version
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          NEXT_VERSION="$(echo "$VERSION" | cut -d. -f1-2).$((PATCH + 1))-SNAPSHOT"
          
          echo "Bumping gradle.properties from '$VERSION' to '$NEXT_VERSION'"
          
          sed -i "s/^version=.*/version=$NEXT_VERSION/" gradle.properties
          echo "gradle.properties version line after update: $(grep '^version=' gradle.properties)"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add gradle.properties
          git commit -m "chore: bump version to $NEXT_VERSION"
          git push
